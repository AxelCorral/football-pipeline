stages:
  - lint
  - test
  - build
  - deploy

# ── Credentials AWS ────────────────────────────────────────────────────────────
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY et AWS_DEFAULT_REGION sont déclarées
# comme variables CI/CD protégées dans GitLab (Settings → CI/CD → Variables).
# Ne jamais les écrire dans ce fichier.
# ──────────────────────────────────────────────────────────────────────────────

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Template partagé — hérité via extends: (YAML merge keys supprimés en GitLab 17)
.python-base:
  image: python:3.12-slim
  cache:
    key: "${CI_COMMIT_REF_SLUG}-pip"
    paths:
      - .cache/pip
  before_script:
    - pip install -r requirements.txt

# ==============================================================================
# LINT
# ==============================================================================

lint:flake8:
  extends: .python-base
  stage: lint
  script:
    - flake8 src/ tests/

lint:black:
  extends: .python-base
  stage: lint
  script:
    - black --check src/ tests/

# ==============================================================================
# TEST
# ==============================================================================

test:unit:
  extends: .python-base
  stage: test
  before_script:
    - pip install -r requirements.txt pytest-cov
  script:
    - |
      pytest tests/ -v --tb=short \
        --junitxml=report.xml \
        --cov=src \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --cov-fail-under=70
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

# ==============================================================================
# BUILD
# ==============================================================================

build:wheel:
  stage: build
  image: python:3.12-slim
  before_script:
    - pip install build
  script:
    - python -m build --wheel
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 7 days

# ==============================================================================
# DEPLOY
# ==============================================================================

deploy:sql-sync:
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    - |
      aws s3 sync queries/ s3://football-pipeline-axel/scripts/ \
        --delete \
        --exclude "*.md"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  environment:
    name: production
    url: https://s3.console.aws.amazon.com/s3/buckets/football-pipeline-axel
