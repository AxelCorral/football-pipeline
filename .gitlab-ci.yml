stages:
  - lint
  - test
  - build
  - deploy

# ── Credentials AWS ────────────────────────────────────────────────────────────
# Les variables AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY et AWS_DEFAULT_REGION
# sont déclarées comme variables CI/CD protégées dans GitLab :
#   Settings → CI/CD → Variables → Add variable (cocher "Protected" et "Masked")
# Ne jamais les écrire dans ce fichier : elles seraient exposées dans les logs
# et dans l'historique git.
# ──────────────────────────────────────────────────────────────────────────────

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.python-base: &python-base
  image: python:3.12-slim
  cache:
    key: "${CI_COMMIT_REF_SLUG}-pip"
    paths:
      - .cache/pip
  before_script:
    - pip install -r requirements.txt

# ==============================================================================
# LINT
# ==============================================================================

lint:flake8:
  <<: *python-base
  stage: lint
  script:
    - flake8 src/ tests/
  # max-line-length = 100 est configuré dans .flake8 (cohérence local/CI)

lint:black:
  <<: *python-base
  stage: lint
  script:
    - black --check src/ tests/

# ==============================================================================
# TEST
# ==============================================================================

test:unit:
  <<: *python-base
  stage: test
  before_script:
    - pip install -r requirements.txt pytest-cov
  script:
    - |
      pytest tests/ -v --tb=short \
        --junitxml=report.xml \
        --cov=src \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --cov-fail-under=70
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      # Résultats de tests visibles dans l'onglet "Tests" de la MR/pipeline GitLab
      junit: report.xml
      # Badge de couverture et diff de couverture dans les MR
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days

# ==============================================================================
# BUILD
# ==============================================================================

build:wheel:
  stage: build
  image: python:3.12-slim
  before_script:
    - pip install build
  script:
    - python -m build --wheel
    - echo "Wheel produit :"
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 7 days

# ==============================================================================
# DEPLOY
# ==============================================================================

deploy:sql-sync:
  stage: deploy
  image: amazon/aws-cli:latest
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY et AWS_DEFAULT_REGION
  # sont injectées automatiquement depuis les variables CI/CD GitLab.
  # Aucune valeur en dur dans ce fichier.
  script:
    - |
      aws s3 sync queries/ s3://football-pipeline-axel/scripts/ \
        --delete \
        --exclude "*.md"
  rules:
    # Déclenchement uniquement sur la branche main, avec approbation manuelle
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false
  environment:
    name: production
    url: https://s3.console.aws.amazon.com/s3/buckets/football-pipeline-axel
